<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing...</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            background: #0b1e39;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: Arial;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 8px solid #ffffff30;
            border-top: 8px solid #4cc9f0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>

</head>

<body>

<div class="loader-box">
    <div class="spinner"></div>
    <h2>Processing your video... Please wait</h2>
</div>

<script>
    setTimeout(() => {
        window.location.href =
          "/process_real?filename={{ filename }}&lang={{ lang }}&ref_voice={{ ref_voice }}";
    }, 1200);
</script>


</body>
</html>
