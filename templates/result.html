<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - AI Voice Replacement</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            background: #0b1e39;
            margin: 0;
            padding: 0;
            color: white;
            font-family: Arial;
            overflow-y: scroll !important;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 40px 0;
            text-align: center;
        }

        video {
            width: 100%;
            max-width: 650px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 18px;
            background: #4cc9f0;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>

</head>

<body>

<div class="container">
    <h1>Final Output</h1>

    <video controls>
        <source src="/assets/outputs/{{ output_video }}" type="video/mp4">
    </video>

   <br>

   <button class="btn" onclick="window.location.href='/'">Upload Another Video</button>

   <a class="btn" href="/assets/outputs/{{ output_video }}" download>
       Download Output
   </a>


</div>

</body>
</html>
