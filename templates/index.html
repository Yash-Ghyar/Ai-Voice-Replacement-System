<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Voice Replacement System</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

  <div class="gradient-bg"></div>

  <!-- ❌ Remove vh-100  |  ✅ Add py-5 -->
  <div class="d-flex justify-content-center align-items-center py-5">
    <div class="upload-card p-4">

      <h2 class="text-center mb-3 title-glow">🎙️ AI Voice Replacement</h2>
      <p class="text-center text-secondary mb-3">
        Upload a short video — transcribe, translate and replace voice using AI.
      </p>

      <form action="/start" method="POST" enctype="multipart/form-data">

        <div class="file-upload mb-3" onclick="document.getElementById('videoInput').click()">
          <input type="file" id="videoInput" name="video" accept="video/*" required style="display:none;" />
          <label class="upload-label">
            <i class="bi bi-cloud-upload"></i> Choose Video
          </label>
        </div>

        <label class="upload-label">Reference Voice</label>
        <select name="ref_voice" class="form-select mb-3">
          <option value="ref_voice_en.wav">English voice</option>
          <option value="ref_voice_hi.wav">Hindi voice</option>
        </select>

        <label class="upload-label">Translate to</label>
        <select name="target_lang" class="form-select mb-4" required>
          <option value="english">English</option>
          <option value="hindi">Hindi</option>
        </select>

        <button type="submit" class="btn glow-btn w-100">🚀 Start AI Processing</button>
      </form>

    </div>
  </div>

</body>
</html>
