<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Voice Replacement System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body>
  <!-- Animated Background -->
  <div class="gradient-bg"></div>

  <div class="container d-flex flex-column align-items-center justify-content-center vh-100 text-light text-center">
    <div class="upload-card p-5 rounded-4 shadow-lg">
      <h1 class="mb-3 fw-bold title-glow">🎙️ AI Voice Replacement</h1>
      <p class="text-secondary mb-4">Transform any short video into a new voice using AI magic.</p>

      <form id="uploadForm" action="/upload_video" method="POST" enctype="multipart/form-data">
        <div class="file-upload mb-4">
          <input type="file" name="video" accept="video/*" id="video" required />
          <label for="video" class="upload-label">
            <i class="bi bi-cloud-upload"></i> Choose Video File
          </label>
        </div>
        <button type="submit" class="btn btn-primary w-100 glow-btn">🚀 Start AI Processing</button>
      </form>

      <div id="loading" class="mt-4 text-info" style="display:none;">
        <div class="spinner-border text-info" role="status"></div>
        <p class="mt-3">Processing your video... Please wait ✨</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("uploadForm").addEventListener("submit", function () {
      document.getElementById("loading").style.display = "block";
    });
  </script>

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
